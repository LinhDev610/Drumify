server:
  port: 8080
  servlet:
    context-path: /drumify

spring:
  application:
    name: Drumify
  datasource:
    url: jdbc:mysql://localhost:3307/drumify_db
    username: root
    password: root
    driverClassName: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8280/realms/drumify-dev